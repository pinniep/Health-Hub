/* ============ storage (localStorage; shared on the same origin) ============ */
const lget = (key, fb) => { try { const v = localStorage.getItem(key); return v == null ? fb : JSON.parse(v); } catch { return fb; } };
const lset = (key, v) => { try { localStorage.setItem(key, JSON.stringify(v)); } catch (e) { console.error(e); } };

/* Shared daily check-in record, co-owned with the strength app.
   CONTRACT: always re-read fresh, update only this date's own fields, write back. Never overwrite the whole object from a cached copy. */
const CHECKINS = "sl:checkins";
const mergeCheckin = (date, patch) => {
  const all = lget(CHECKINS, {});            // fresh read every time
  all[date] = { ...(all[date] || {}), ...patch }; // only this date's fields
  lset(CHECKINS, all);
  return all;
};

/* Training day is detected from the strength app's data — no manual toggle. Treat missing keys as "not trained", never assume shape. */
const isTrainingDay = (date) => {
  const entries = lget("sl:entries", []);
  if (Array.isArray(entries) && entries.some((e) => e && e.dt === date)) return true;
  const acts = lget("sl:activities", {});
  const a = acts && acts[date];
  return Array.isArray(a) && a.length > 0;
};

/* ============ dates ============ */

const addDays = (k, n) => { const d = new Date(k); d.setDate(d.getDate() + n); return fmt(d); };

const weekDatesOffset = (off) => { const o = []; for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - off * 7 - i); o.push(fmt(d)); } return o; };

function EnergyBars({ level, onBleed }) {
  const n = level === "High" ? 3 : level === "Medium" ? 2 : level === "Low" ? 1 : 0;
  if (!n) return null;
  const heights = ["h-1.5", "h-2", "h-2.5"];
  const fill = onBleed ? "bg-white" : "bg-violet-600";
  return (
    <span className="absolute bottom-1 left-1/2 -translate-x-1/2 flex items-end gap-0.5">
      {heights.slice(0, n).map((h, i) => <span key={i} className={`w-1 ${h} rounded-sm ${fill}`} />)}
    </span>
  );
}

const blankIng = () => ({ name: "", g: "", k: "", p: "", c: "", f: "", fe: "", ca: "", price: "" });
const normIng = (i) => i.g != null
  ? { name: i.name || "", g: i.g, k: +i.k || 0, p: +i.p || 0, c: +i.c || 0, f: +i.f || 0, fe: +i.fe || 0, ca: +i.ca || 0, price: i.price || "" }
  : { name: i.name || "", g: 100, k: +(i.k ?? i.kcal) || 0, p: +i.p || 0, c: +i.c || 0, f: +i.f || 0, fe: +i.fe || 0, ca: +i.ca || 0, price: "" };

const calc = (r) => {
  const s = r.servings || 1;
  const t = { kcal: 0, p: 0, c: 0, f: 0, ca: 0, fe: 0, cost: 0 };
  (r.ing || []).forEach((i) => {
    const factor = i.g != null ? (+i.g || 0) / 100 : 1;
    t.kcal += (+(i.k ?? i.kcal) || 0) * factor;
    t.p += (+i.p || 0) * factor; t.c += (+i.c || 0) * factor; t.f += (+i.f || 0) * factor;
    t.ca += (+i.ca || 0) * factor; t.fe += (+i.fe || 0) * factor;
    t.cost += (+i.price || 0) * (+i.g || 0) / 1000;
  });
  const o = {}; for (const k in t) o[k] = t[k] / s; return o;
};

function cyclePhase(day) {
  if (day == null) return null;
  if (day <= 5) return { name: "Menstrual", tip: "Energy may dip — lighter sessions are completely fine." };
  if (day <= 13) return { name: "Follicular", tip: "Energy often rising — a good window for harder lifts." };
  if (day <= 16) return { name: "Around ovulation", tip: "Often your strongest, highest-energy days." };
  return { name: "Luteal", tip: "Appetite and cravings often climb — extra carbs or a snack help." };
}

function LabeledNum({ label, value, onChange, w = "" }) {
  return (
    <div className={w}>
      <label className="block text-[10px] uppercase tracking-wide text-stone-400 mb-0.5">{label}</label>

  );
}

/* ============ App ============ */
function App() {
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("today");
  const [meals, setMeals] = useState(DEFAULT_MEALS);
  const [customFoods, setCustomFoods] = useState([]);

  const [showSettings, setShowSettings] = useState(false);

    setMeals(lget("food:meal-library", DEFAULT_MEALS));
    setCustomFoods(lget("food:custom-foods", []));
    setSettings({ ...DEFAULT_SETTINGS, ...lget("food:settings", DEFAULT_SETTINGS) });
    setCheckins(lget(CHECKINS, {}));
    const t = todayKey();
    setDayCache({ [t]: lget("food:log:" + t, { entries: [] }) });
    setLoading(false);
  }, []);

  const log = dayCache[viewDate] || { entries: [] };
  const saveLog = (n) => { setDayCache({ ...dayCache, [viewDate]: n }); lset("food:log:" + viewDate, n); };

    if (date > todayKey()) return;
    if (dayCache[date] === undefined) setDayCache((prev) => ({ ...prev, [date]: lget("food:log:" + date, { entries: [] }) }));
    setViewDate(date);
  };
  const saveMeals = (n) => { setMeals(n); lset("food:meal-library", n); };
  const saveCustomFoods = (n) => { setCustomFoods(n); lset("food:custom-foods", n); };
  const saveSettings = (n) => { setSettings(n); lset("food:settings", n); };
  /* merge-on-save into the shared record, then refresh local state */
  const saveCheckin = (date, patch) => { const all = mergeCheckin(date, patch); setCheckins({ ...all }); };

  const mergedFoods = (() => {
    const map = new Map();
    FOODS.forEach((f) => map.set(f.name, { ...f, source: "builtin" }));
    customFoods.forEach((f) => map.set(f.name, { ...f, source: FOODS.some((b) => b.name === f.name) ? "edited" : "custom" }));
    return Array.from(map.values()).sort((a, b) => a.name.localeCompare(b.name));
  })();

  /* cycle derived from shared check-ins where bleed === "Bleeding" */
  const bleedDays = Object.keys(checkins).filter((d) => checkins[d] && checkins[d].bleed === "Bleeding").sort();
  let lastStart = null, prev = null;
  for (const d of bleedDays) { if (prev === null || daysBetween(prev, d) > 3) lastStart = d; prev = d; }
  let cycleDay = null;
  if (lastStart && daysBetween(lastStart, viewDate) >= 0) cycleDay = daysBetween(lastStart, viewDate) + 1;
  const phase = cyclePhase(cycleDay);

  if (loading) return <div className="min-h-screen flex items-center justify-center text-stone-500">Loading…</div>;

  return (
    <div className="min-h-screen bg-stone-100 text-stone-800" style={{ fontFamily: "system-ui, -apple-system, Segoe UI, Roboto, sans-serif" }}>

            <p className="text-sm text-stone-500">Muscle first — never under-fuelled.</p>
          </div>
          <div className="flex items-center gap-1">
            <a href="./index.html" className="p-2 rounded-xl hover:bg-stone-200 text-stone-500" aria-label="Dashboard"><Home size={20} /></a>
            <a href="./strength.html" className="p-2 rounded-xl hover:bg-stone-200 text-stone-500" aria-label="Strength app"><Dumbbell size={20} /></a>

          </div>
        </div>

        <div className="bg-white rounded-2xl border border-stone-200 p-1 flex mb-4">
          {[["today", Flame, "Today"], ["week", CalendarDays, "Week"], ["meals", UtensilsCrossed, "Meals"], ["cycle", Heart, "Cycle"]].map(([id, Icon, label]) => (
            <button key={id} onClick={() => setTab(id)} className={`flex-1 py-2 rounded-xl text-sm font-medium flex items-center justify-center gap-1.5 ${tab === id ? "bg-violet-100 text-violet-700" : "text-stone-500"}`}>
              <Icon size={16} /> {label}
            </button>
          ))}
        </div>

        {tab === "today" && <Today log={log} saveLog={saveLog} meals={meals} foods={mergedFoods} settings={settings} phase={phase} cycleDay={cycleDay} viewDate={viewDate} goToDate={goToDate} checkins={checkins} saveCheckin={saveCheckin} />}
        {tab === "week" && <Week settings={settings} goToDate={goToDate} setTab={setTab} />}
        {tab === "meals" && <Meals meals={meals} saveMeals={saveMeals} log={log} saveLog={saveLog} settings={settings} foods={mergedFoods} customFoods={customFoods} saveCustomFoods={saveCustomFoods} />}
        {tab === "cycle" && <Cycle checkins={checkins} saveCheckin={saveCheckin} dateK={todayKey()} settings={settings} />}
      </div>

      {showSettings && <SettingsModal settings={settings} saveSettings={saveSettings} onClose={() => setShowSettings(false)} />}
    </div>
  );
}

/* ============ TODAY ============ */
function Today({ log, saveLog, meals, foods, settings, phase, cycleDay, viewDate, goToDate, checkins, saveCheckin }) {
  const isToday = viewDate === todayKey();
  const training = isTrainingDay(viewDate);
  const ck = checkins[viewDate] || {};
  const [plate, setPlate] = useState(null); // { name:"", ings:[{name,g,k,p,c,f,fe,ca}] }
  const [ingDraft, setIngDraft] = useState({ name: "", g: "" });
  const [snack, setSnack] = useState(null); // { name, kcal, p }
  const setEnergy = (k) => saveCheckin(viewDate, { energy: ck.energy === k ? "—" : k });
  const setMood = (k) => saveCheckin(viewDate, { feeling: ck.feeling === k ? "—" : k });

  /* macros for an ingredient at a given gram weight (library values are per 100 g) */
  const ingMacros = (f, g) => {
    const factor = (+g || 0) / 100;
    return { kcal: (+(f.k ?? f.kcal) || 0) * factor, p: (+f.p || 0) * factor, c: (+f.c || 0) * factor, f: (+f.f || 0) * factor, fe: (+f.fe || 0) * factor, ca: (+f.ca || 0) * factor };
  };
  const addIngToPlate = () => {
    const f = (foods || []).find((x) => x.name === ingDraft.name);
    const g = +ingDraft.g;
    if (!f || !(g > 0)) return;
    setPlate((p) => ({ ...p, ings: [...(p.ings || []), { name: f.name, g, k: +(f.k ?? f.kcal) || 0, p: +f.p || 0, c: +f.c || 0, f: +f.f || 0, fe: +f.fe || 0, ca: +f.ca || 0 }] }));
    setIngDraft({ name: "", g: "" });
  };
  const removeIngFromPlate = (idx) => setPlate((p) => ({ ...p, ings: (p.ings || []).filter((_, i) => i !== idx) }));

  const addPlate = () => {
    const ings = plate.ings || [];
    if (ings.length === 0) { setPlate(null); return; }
    const name = (plate.name || "").trim();
    const entries = [...log.entries];
    if (name) {
      const sum = ings.reduce((a, i) => { const m = ingMacros(i, i.g); return { kcal: a.kcal + m.kcal, p: a.p + m.p, c: a.c + m.c, f: a.f + m.f, fe: a.fe + m.fe, ca: a.ca + m.ca }; }, { kcal: 0, p: 0, c: 0, f: 0, fe: 0, ca: 0 });
      entries.push({ name, ...sum, qty: 1, uid: Date.now() + Math.random() });
    } else {
      ings.forEach((i) => entries.push({ name: `${i.name} · ${i.g} g`, ...ingMacros(i, i.g), qty: 1, uid: Date.now() + Math.random() }));
    }
    saveLog({ ...log, entries });
    setPlate(null);
    setIngDraft({ name: "", g: "" });
  };

  const addSnack = () => {
    const kc = +snack.kcal || 0;
    const name = snack.name.trim() || "Snack";
    saveLog({ ...log, entries: [...log.entries, { name, kcal: kc, p: +snack.p || 0, c: 0, f: 0, fe: 0, ca: 0, qty: 1, snack: true, uid: Date.now() + Math.random() }] });
    setSnack(null);
  };

  const totals = log.entries.reduce((a, e) => ({
    kcal: a.kcal + e.kcal * e.qty, p: a.p + e.p * e.qty, c: a.c + e.c * e.qty,
    f: a.f + e.f * e.qty, ca: a.ca + (e.ca || 0) * e.qty, fe: a.fe + (e.fe || 0) * e.qty,
  }), { kcal: 0, p: 0, c: 0, f: 0, ca: 0, fe: 0 });
  const target = training ? settings.trainTarget : settings.restTarget;
  const kcalPct = target ? totals.kcal / target : 0;
  const proPct = settings.proteinTarget ? totals.p / settings.proteinTarget : 0;

  let fuel;
  if (kcalPct < 0.8) fuel = { cls: "bg-amber-50 border-amber-200 text-amber-900", msg: "Under-fuelled so far — add a snack or a bigger portion." };
  else if (kcalPct <= 1.15) fuel = { cls: "bg-violet-50 border-violet-200 text-violet-900", msg: "Well fuelled. This is the zone." };
  else fuel = { cls: "bg-stone-50 border-stone-200 text-stone-700", msg: "Plenty in the tank today — balance it over the week." };

  const add = (m) => { const ps = calc(m); saveLog({ ...log, entries: [...log.entries, { name: m.name, ...ps, qty: 1, uid: Date.now() + Math.random() }] }); };
  const setQty = (uid, d) => saveLog({ ...log, entries: log.entries.map((e) => e.uid === uid ? { ...e, qty: Math.max(0.5, e.qty + d) } : e) });
  const remove = (uid) => saveLog({ ...log, entries: log.entries.filter((e) => e.uid !== uid) });

  const Bar = ({ pct, color }) => <div className="h-2 rounded-full bg-stone-200 overflow-hidden"><div className={`h-full ${color}`} style={{ width: `${Math.min(100, Math.round(pct * 100))}%` }} /></div>;

  return (
    <div className="space-y-4">
      <div className="bg-white rounded-2xl border border-stone-200 p-2 flex items-center justify-between">
        <button onClick={() => goToDate(addDays(viewDate, -1))} className="p-2 rounded-xl hover:bg-stone-100"><ChevronLeft size={16} /></button>
        <div className="text-center">
          <p className="text-sm font-medium">{isToday ? "Today" : niceDate(viewDate)}</p>
          {!isToday && <button onClick={() => goToDate(todayKey())} className="text-xs text-violet-600">jump to today</button>}
        </div>
        <button onClick={() => !isToday && goToDate(addDays(viewDate, 1))} disabled={isToday} className={`p-2 rounded-xl hover:bg-stone-100 ${isToday ? "opacity-30" : ""}`}><ChevronRight size={16} /></button>
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 px-4 py-2.5 text-xs text-stone-500 flex items-center gap-2">
        <span className={`w-2 h-2 rounded-full ${training ? "bg-violet-500" : "bg-stone-300"}`} />
        {training ? "Training day — detected from your strength log, target lifted" : "Rest day — no workout logged for this date yet"}
      </div>

      <div className={`rounded-2xl border p-4 ${fuel.cls}`}>
        <p className="text-sm font-medium">{fuel.msg}</p>
        {training && <p className="text-xs mt-1 opacity-80">Training day — aim a little higher, mostly from carbs.</p>}
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 p-4 space-y-4">
        <div>
          <div className="flex justify-between text-sm mb-1"><span className="text-stone-500">Calories in</span><span className="font-medium">{Math.round(totals.kcal)} / {target}</span></div>
          <Bar pct={kcalPct} color={kcalPct < 0.8 ? "bg-amber-300" : "bg-violet-400"} />
        </div>
        <div>
          <div className="flex justify-between text-sm mb-1"><span className="text-stone-500">Protein</span><span className="font-medium">{Math.round(totals.p)} / {settings.proteinTarget} g</span></div>
          <Bar pct={proPct} color={proPct < 0.85 ? "bg-amber-300" : "bg-violet-400"} />
        </div>
        <div className="flex gap-4 text-xs text-stone-500">
          <span>Carbs <b className="text-stone-700">{Math.round(totals.c)} g</b></span>
          <span>Fat <b className="text-stone-700">{Math.round(totals.f)} g</b></span>
          {cycleDay && phase && <span className="ml-auto text-amber-600">{phase.name} · day {cycleDay}</span>}
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 p-4">
        <h2 className="text-sm font-medium text-stone-500 flex items-center gap-1 mb-2"><Droplet size={15} /> Micronutrients</h2>
        <div className="flex justify-between text-sm mb-1"><span className="text-stone-500">Calcium</span><span className="font-medium">{Math.round(totals.ca)} / {settings.calciumTarget} mg</span></div>
        <div className="h-2 rounded-full bg-stone-200 overflow-hidden"><div className={`h-full ${totals.ca < settings.calciumTarget ? "bg-violet-400" : "bg-violet-500"}`} style={{ width: `${Math.min(100, Math.round(totals.ca / settings.calciumTarget * 100))}%` }} /></div>
        <div className="flex justify-between text-sm mt-3"><span className="text-stone-500">Iron</span><span className="font-medium">{totals.fe.toFixed(1)} mg</span></div>
        <p className="text-xs text-stone-400 mt-2">Calcium goal {settings.calciumTarget} mg/day (your GP's number) for bone health. Iron is directional — compare with your blood tests.</p>
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 p-4">
        <h2 className="text-sm font-medium text-stone-500 mb-3">How you feel</h2>
        <p className="text-xs text-stone-400 mb-1">Energy</p>
        <div className="flex gap-2 mb-3">
          {ENERGY.map((k) => <button key={k} onClick={() => setEnergy(k)} className={`flex-1 py-2 rounded-xl text-sm ${ck.energy === k ? "bg-violet-200 text-violet-900 font-medium" : "bg-stone-50 text-stone-500"}`}>{k}</button>)}
        </div>
        <p className="text-xs text-stone-400 mb-1">Mood</p>
        <div className="flex gap-2">
          {MOODS.map((m) => <button key={m.key} onClick={() => setMood(m.key)} className={`flex-1 py-2 rounded-xl text-sm ${ck.feeling === m.key ? `${m.sel} font-medium` : "bg-stone-50 text-stone-500"}`}>{m.label}</button>)}
        </div>
        <p className="text-xs text-stone-400 mt-2">Shared with your strength app — log it in either, see it in both, and against your cycle on the Cycle tab.</p>
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 p-4">
        <h2 className="text-sm font-medium text-stone-500 mb-3">{isToday ? "Today's food" : "Food logged"}</h2>
        {log.entries.length === 0 && <p className="text-sm text-stone-400 mb-3">Nothing logged yet — tap a meal below to add it.</p>}
        <div className="space-y-2">
          {log.entries.map((e) => (
            <div key={e.uid} className="flex items-center gap-2 text-sm">
              <span className="flex-1">{e.name}{e.snack && <span className="ml-1.5 text-[10px] px-1.5 py-0.5 rounded-full bg-stone-100 text-stone-400 align-middle">snack</span>}</span>
              <span className="text-stone-400 w-16 text-right">{Math.round(e.kcal * e.qty)} kcal</span>
              <button onClick={() => setQty(e.uid, -0.5)} className="p-1 rounded-lg hover:bg-stone-100"><Minus size={14} /></button>
              <span className="w-8 text-center">{e.qty}×</span>
              <button onClick={() => setQty(e.uid, 0.5)} className="p-1 rounded-lg hover:bg-stone-100"><Plus size={14} /></button>
              <button onClick={() => remove(e.uid)} className="p-1 rounded-lg hover:bg-rose-50 text-rose-400"><Trash2 size={14} /></button>
            </div>
          ))}
        </div>
        <div className="border-t border-stone-100 mt-3 pt-3">
          <div className="flex items-center justify-between mb-2">
            <p className="text-xs text-stone-400">Quick add</p>
            <div className="flex gap-2">
              <button onClick={() => setSnack({ name: "", kcal: "", p: "" })} className="text-xs px-3 py-1 rounded-full bg-stone-100 text-stone-600 hover:bg-stone-200">+ Snack</button>
              <button onClick={() => setPlate({ ings: [], name: "" })} className="text-xs px-3 py-1 rounded-full bg-violet-100 text-violet-700 hover:bg-violet-200">Build a plate</button>
            </div>
          </div>
          <div className="flex flex-wrap gap-2">
            {meals.map((m) => <button key={m.id} onClick={() => add(m)} className="text-xs px-3 py-1.5 rounded-full bg-violet-50 text-violet-700 hover:bg-violet-100">+ {m.name}</button>)}
          </div>
        </div>
      </div>

      {plate !== null && (
        <div className="fixed inset-0 bg-black/40 flex items-end sm:items-center justify-center z-10 p-4" onClick={() => setPlate(null)}>
          <div className="bg-white rounded-2xl p-4 w-full max-w-sm max-h-[85vh] overflow-y-auto space-y-3" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between">
              <h2 className="text-base font-medium">Build a plate</h2>
              <button onClick={() => setPlate(null)} className="p-1 text-stone-400"><X size={18} /></button>
            </div>

            <div>
              <label className="block text-[10px] uppercase tracking-wide text-stone-400 mb-1">Dish name <span className="normal-case tracking-normal text-stone-300">(optional)</span></label>
              <input value={plate.name || ""} onChange={(e) => setPlate({ ...plate, name: e.target.value })} placeholder="e.g. Chicken stir-fry" className="w-full px-3 py-2 rounded-xl border border-stone-200 text-sm" />
              <p className="text-[11px] text-stone-400 mt-1">Name it to log as one tidy line, or leave blank to add each ingredient separately.</p>
            </div>

            <div className="pt-1 border-t border-stone-100">
              <p className="text-[11px] uppercase tracking-wide text-stone-400 mb-2 mt-2">Ingredients</p>
              {(plate.ings || []).map((i, idx) => (
                <div key={idx} className="flex items-center gap-2 text-sm mb-1">
                  <span className="flex-1">{i.name} · {i.g} g</span>
                  <span className="text-stone-400 w-14 text-right">{Math.round(ingMacros(i, i.g).kcal)} kcal</span>
                  <button onClick={() => removeIngFromPlate(idx)} className="p-1 rounded-lg hover:bg-rose-50 text-rose-400"><Trash2 size={14} /></button>
                </div>
              ))}
              <div className="flex items-center gap-2 mt-1">
                <select value={ingDraft.name} onChange={(e) => setIngDraft({ ...ingDraft, name: e.target.value })} className="flex-1 min-w-0 px-2 py-2 rounded-xl border border-stone-200 text-sm bg-white">
                  <option value="">Pick an ingredient…</option>
                  {(foods || []).map((f) => <option key={f.name} value={f.name}>{f.name}</option>)}
                </select>
                <input type="number" inputMode="decimal" placeholder="g" value={ingDraft.g} onChange={(e) => setIngDraft({ ...ingDraft, g: e.target.value })} className="w-14 px-2 py-2 rounded-xl border border-stone-200 text-sm text-right" />
                <button onClick={addIngToPlate} disabled={!ingDraft.name || !(+ingDraft.g > 0)} className="p-2 rounded-xl bg-violet-100 text-violet-700 disabled:opacity-40"><Plus size={16} /></button>
              </div>
              {ingDraft.name && +ingDraft.g > 0 && (() => { const f = (foods || []).find((x) => x.name === ingDraft.name); if (!f) return null; const mac = ingMacros(f, ingDraft.g); return <p className="text-[11px] text-stone-400 mt-1">≈ {Math.round(mac.kcal)} kcal · {Math.round(mac.p)} g protein for {ingDraft.g} g</p>; })()}
              <p className="text-[11px] text-stone-400 mt-1">Don't see an ingredient? Add it on the Meals tab and it'll appear here.</p>
            </div>

            <button onClick={addPlate} disabled={!(plate.ings || []).length} className="w-full py-2.5 rounded-xl bg-violet-200 text-violet-900 font-medium mt-1 hover:bg-violet-300 disabled:opacity-40">Add to {isToday ? "today" : "this day"}</button>
          </div>
        </div>
      )}

      {snack !== null && (
        <div className="fixed inset-0 bg-black/40 flex items-end sm:items-center justify-center z-10 p-4" onClick={() => setSnack(null)}>
          <div className="bg-white rounded-2xl p-4 w-full max-w-sm space-y-3" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between">
              <h2 className="text-base font-medium">Quick snack</h2>
              <button onClick={() => setSnack(null)} className="p-1 text-stone-400"><X size={18} /></button>
            </div>
            <p className="text-xs text-stone-400">For something you ate but don't want to log in full — a rough calorie note so your day's fuel total stays honest.</p>
            <div>
              <label className="block text-[10px] uppercase tracking-wide text-stone-400 mb-1">What was it?</label>
              <input value={snack.name} onChange={(e) => setSnack({ ...snack, name: e.target.value })} placeholder="e.g. handful of chips" className="w-full px-3 py-2 rounded-xl border border-stone-200 text-sm" />
            </div>
            <div className="flex gap-2">
              <div className="flex-1">
                <label className="block text-[10px] uppercase tracking-wide text-stone-400 mb-1">Approx. calories</label>
                <input type="number" inputMode="numeric" value={snack.kcal} onChange={(e) => setSnack({ ...snack, kcal: e.target.value })} placeholder="kcal" className="w-full px-3 py-2 rounded-xl border border-stone-200 text-sm" />
              </div>
              <div className="w-24">
                <label className="block text-[10px] uppercase tracking-wide text-stone-400 mb-1">Protein</label>
                <input type="number" inputMode="numeric" value={snack.p} onChange={(e) => setSnack({ ...snack, p: e.target.value })} placeholder="g (opt.)" className="w-full px-3 py-2 rounded-xl border border-stone-200 text-sm" />
              </div>
            </div>
            <button onClick={addSnack} disabled={!(+snack.kcal > 0)} className="w-full py-2.5 rounded-xl bg-violet-200 text-violet-900 font-medium hover:bg-violet-300 disabled:opacity-40">Add to {isToday ? "today" : "this day"}</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============ WEEK ============ */
function Week({ settings, goToDate, setTab }) {
  const [off, setOff] = useState(0);
  const data = weekDatesOffset(off).map((d) => {
    const l = lget("food:log:" + d, { entries: [] });
    const kcal = (l.entries || []).reduce((a, e) => a + e.kcal * e.qty, 0);
    return { d, kcal, target: isTrainingDay(d) ? settings.trainTarget : settings.restTarget, logged: (l.entries || []).length > 0 };
  });
  const elapsed = data.filter((x) => x.logged);
  const balance = Math.round(elapsed.reduce((a, x) => a + x.kcal, 0) - elapsed.reduce((a, x) => a + x.target, 0));
  const max = Math.max(...data.map((x) => Math.max(x.kcal, x.target)), 1);
  const label = off === 0 ? "This week" : off === 1 ? "Last week" : `${shortDate(data[0].d)} – ${shortDate(data[6].d)}`;
  const openDay = (d) => { goToDate(d); setTab("today"); };

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <button onClick={() => setOff(off + 1)} className="p-2 rounded-xl bg-white border border-stone-200"><ChevronLeft size={16} /></button>
        <span className="text-sm font-medium text-stone-600">{label}</span>
        <button onClick={() => off > 0 && setOff(off - 1)} disabled={off === 0} className={`p-2 rounded-xl bg-white border border-stone-200 ${off === 0 ? "opacity-30" : ""}`}><ChevronRight size={16} /></button>
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 p-4">
        <h2 className="text-sm font-medium text-stone-500 mb-1">Balance ({label.toLowerCase()})</h2>
        {elapsed.length === 0 ? <p className="text-sm text-stone-400">No days logged in this week.</p> : (
          <React.Fragment>
            <p className="text-2xl font-medium">{balance >= 0 ? "+" : ""}{balance} kcal</p>
            <p className="text-xs text-stone-500 mt-1">
              {balance < -1500 ? "Running under — room to eat more, no need to hold back." :
               balance > 1500 ? "Running over — ease back a little across the next days." :
               "Nicely balanced. A party day evens out — that's the point."}
            </p>
          </React.Fragment>
        )}
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 p-4 space-y-3">
        {data.map((x) => (
          <button key={x.d} onClick={() => openDay(x.d)} className="w-full text-left">
            <div className="flex justify-between text-xs mb-1"><span className="text-stone-500">{shortDay(x.d)} {shortDate(x.d)}</span><span className="text-stone-400">{x.logged ? `${Math.round(x.kcal)} / ${x.target}` : "tap to add"}</span></div>
            <div className="h-2 rounded-full bg-stone-100 overflow-hidden relative">
              <div className="absolute top-0 bottom-0 w-px bg-stone-400" style={{ left: `${(x.target / max) * 100}%` }} />
              <div className={`h-full ${x.kcal < x.target * 0.8 ? "bg-amber-300" : "bg-violet-300"}`} style={{ width: `${Math.min(100, (x.kcal / max) * 100)}%` }} />
            </div>
          </button>
        ))}
        <p className="text-xs text-stone-400 pt-1">Tap any day to add or fix what you ate. Aim for the week to balance, not every day.</p>
      </div>
    </div>
  );
}

/* ============ MEALS ============ */
function Meals(props) {
  const [sub, setSub] = useState("recipes");
  return (
    <div className="space-y-3">
      <div className="bg-white rounded-2xl border border-stone-200 p-1 flex">
        {[["recipes", "Recipes"], ["ingredients", "Ingredients"]].map(([id, label]) => (
          <button key={id} onClick={() => setSub(id)} className={`flex-1 py-1.5 rounded-xl text-sm font-medium ${sub === id ? "bg-amber-100 text-amber-800" : "text-stone-500"}`}>{label}</button>
        ))}
      </div>
      {sub === "recipes" ? <Recipes {...props} /> : <IngredientDB foods={props.foods} customFoods={props.customFoods} saveCustomFoods={props.saveCustomFoods} />}
    </div>
  );
}

function Recipes({ meals, saveMeals, log, saveLog, settings, foods }) {
  const [editing, setEditing] = useState(null);
  const [openId, setOpenId] = useState(null);
  const cur = settings.currency || "$";
  const startNew = () => setEditing({ id: "u" + Date.now(), name: "", servings: 1, steps: "", ing: [blankIng()], isNew: true });
  const editExisting = (m) => setEditing({ ...m, ing: (m.ing || [blankIng()]).map(normIng) });
  const logIt = (m) => { const ps = calc(m); saveLog({ ...log, entries: [...log.entries, { name: m.name, ...ps, qty: 1, uid: Date.now() + Math.random() }] }); };
  const del = (id) => saveMeals(meals.filter((m) => m.id !== id));

  if (editing) return <RecipeEditor recipe={editing} cur={cur} foods={foods} onCancel={() => setEditing(null)} onSave={(r) => {
    const { isNew, ...rest } = r;
    saveMeals(meals.some((m) => m.id === r.id) ? meals.map((m) => m.id === r.id ? rest : m) : [...meals, rest]);
    setEditing(null);
  }} />;

  return (
    <div className="space-y-3">

        <div className="text-xs">Iron {ps.fe.toFixed(1)} mg · Calcium {ps.ca.toFixed(0)} mg{ps.cost > 0 ? ` · ${cur}${ps.cost.toFixed(2)}/serve` : ""}</div>

  );
}

function IngredientRow({ ig, onChange, onDelete, cur, foods }) {
  const [open, setOpen] = useState(false);
  const factor = (+ig.g || 0) / 100;
  const ccal = Math.round((+ig.k || 0) * factor);
  const ccost = (+ig.price || 0) * (+ig.g || 0) / 1000;
  const inList = foods.some((x) => x.name === ig.name);
  const pick = (name) => {
    if (name === "__custom") { onChange({ name: "", k: "", p: "", c: "", f: "", fe: "", ca: "" }); setOpen(true); return; }
    const f = foods.find((x) => x.name === name);
    if (f) onChange({ name: f.name, k: f.k, p: f.p, c: f.c, f: f.f, fe: f.fe, ca: f.ca });
  };
  return (
    <div className="border border-stone-100 rounded-xl p-2 space-y-2">
      <div className="flex gap-2">
        <select value={inList ? ig.name : (ig.name ? "__custom" : "")} onChange={(e) => pick(e.target.value)} className="flex-1 px-2 py-1.5 rounded-lg border border-stone-200 text-sm bg-white">
          <option value="">Choose ingredient…</option>
          {foods.map((f) => <option key={f.name} value={f.name}>{f.name}</option>)}
          <option value="__custom">Custom / other…</option>
        </select>
        <button onClick={onDelete} className="p-1 text-stone-300 hover:text-rose-400"><Trash2 size={14} /></button>
      </div>
      {!inList && <input value={ig.name} onChange={(e) => onChange({ name: e.target.value })} placeholder="Ingredient name" className="w-full px-2 py-1.5 rounded-lg border border-stone-200 text-xs" />}
      <div className="flex gap-2">
        <LabeledNum label="Amount (g)" value={ig.g} onChange={(v) => onChange({ g: v })} w="flex-1" />
        <LabeledNum label={`Price (${cur}/kg)`} value={ig.price} onChange={(v) => onChange({ price: v })} w="flex-1" />
      </div>
      <div className="flex items-center justify-between text-xs">
        <span className="text-stone-400">→ {ccal} kcal{ccost > 0 ? ` · ${cur}${ccost.toFixed(2)}` : ""}</span>
        <button onClick={() => setOpen(!open)} className="text-stone-400 flex items-center gap-1">nutrition / 100 g {open ? <ChevronUp size={12} /> : <ChevronDown size={12} />}</button>
      </div>
      {open && <div className="grid grid-cols-3 gap-1.5">{NUT_FIELDS.map(([k, label]) => <LabeledNum key={k} label={label} value={ig[k]} onChange={(v) => onChange({ [k]: v })} />)}</div>}
    </div>
  );
}

/* ============ CYCLE (reads/writes shared sl:checkins) ============ */
function Cycle({ checkins, saveCheckin, dateK, settings }) {
  const today = dateK;
  const bleedDays = Object.keys(checkins).filter((d) => checkins[d] && checkins[d].bleed === "Bleeding").sort();
  const bleedSet = new Set(bleedDays);
  const toggle = (d) => saveCheckin(d, { bleed: bleedSet.has(d) ? "" : "Bleeding" });

  const starts = [];
  let prev = null;
  for (const d of bleedDays) { if (prev === null || daysBetween(prev, d) > 3) starts.push(d); prev = d; }
  const lastStart = starts.length ? starts[starts.length - 1] : null;
  let avgLen = settings.cycleLength || 28;
  let usingAvg = false;
  if (starts.length >= 2) {
    const diffs = [];
    for (let i = 1; i < starts.length; i++) diffs.push(daysBetween(starts[i - 1], starts[i]));
    const recent = diffs.slice(-6);
    avgLen = Math.round(recent.reduce((a, b) => a + b, 0) / recent.length);
    usingAvg = true;
  }
  const lastBleed = bleedDays.length ? bleedDays[bleedDays.length - 1] : null;
  const cycleDay = lastStart && daysBetween(lastStart, today) >= 0 ? daysBetween(lastStart, today) + 1 : null;
  const phase = cyclePhase(cycleDay);
  const predNextStart = lastStart ? addDays(lastStart, avgLen) : null;
  const daysToNext = predNextStart ? daysBetween(today, predNextStart) : null;
  const predicted = new Set();
  if (predNextStart) for (let i = 0; i < 5; i++) predicted.add(addDays(predNextStart, i));

  const [cur, setCur] = useState(() => { const d = new Date(today); return { y: d.getFullYear(), m: d.getMonth() }; });
  const monthLabel = new Date(cur.y, cur.m, 1).toLocaleDateString("en-AU", { month: "long", year: "numeric" });
  const firstWeekday = (new Date(cur.y, cur.m, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(cur.y, cur.m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  const prevMonth = () => setCur(cur.m === 0 ? { y: cur.y - 1, m: 11 } : { y: cur.y, m: cur.m - 1 });
  const nextMonth = () => setCur(cur.m === 11 ? { y: cur.y + 1, m: 0 } : { y: cur.y, m: cur.m + 1 });
  const dn = (n) => `${n} day${n === 1 ? "" : "s"}`;

  const PHASES = [
    { name: "Menstrual", range: "days 1–5", feel: "Energy often lowest the first day or two, then lifting. Mood can feel tender; many feel relief once the period arrives.", train: "Gentle to moderate early; ease back into strength as bleeding settles. No need to push the first days." },
    { name: "Follicular", range: "≈ days 6–13", feel: "Rising energy and mood as oestrogen climbs — often the most motivated, best-feeling stretch.", train: "Prime time for heavy strength, intervals and PRs; your body handles intensity well here." },
    { name: "Around ovulation", range: "≈ days 14–16", feel: "Peak energy and strength; confidence and libido often high.", train: "Great for top-end efforts — but joints sit a touch laxer at the oestrogen peak, so mind form on heavy lifts." },
    { name: "Luteal", range: "≈ day 17 to your period", feel: "Energy tapers, body runs warmer, sleep and mood can dip; appetite and cravings (hello, chips) climb pre-period.", train: "Favour steady-state and moderate strength; intensity feels harder. Lean into more carbs and protein, and protect recovery." },
  ];

  return (
    <div className="space-y-4">
      <div className="bg-amber-50 rounded-2xl border border-amber-200 p-4">
        {cycleDay ? (
          <React.Fragment>
            <p className="text-sm text-amber-900 font-medium">{phase.name} · cycle day {cycleDay}</p>
            <p className="text-xs text-amber-800 mt-1">{phase.tip}</p>
            <div className="flex flex-wrap gap-x-4 gap-y-1 mt-2 text-xs text-amber-700">
              {lastBleed && <span>Last bleed {dn(daysBetween(lastBleed, today))} ago</span>}
              {daysToNext != null && <span>{daysToNext >= 0 ? `Expected in ~${dn(daysToNext)}` : `Expected ~${dn(-daysToNext)} ago`}</span>}
            </div>
            <p className="text-[11px] text-amber-600 mt-2">Based on {usingAvg ? `a ${avgLen}-day average of your recent cycles` : `your usual ${avgLen}-day cycle`}. It re-estimates each time you log a real bleed. Perimenopause is irregular — a guide, not a clock.</p>
          </React.Fragment>
        ) : <p className="text-sm text-amber-800">Tap the days you bleed. Once there are a couple, you'll see your phase and an estimated next date (starting from your usual {avgLen}-day cycle).</p>}
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 p-4">
        <div className="flex items-center justify-between mb-3">
          <button onClick={prevMonth} className="p-2 rounded-xl hover:bg-stone-100"><ChevronLeft size={16} /></button>
          <span className="text-sm font-medium text-stone-700">{monthLabel}</span>
          <button onClick={nextMonth} className="p-2 rounded-xl hover:bg-stone-100"><ChevronRight size={16} /></button>
        </div>
        <div className="grid grid-cols-7 gap-1 mb-1">
          {["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"].map((d) => <div key={d} className="text-center text-[11px] text-stone-400">{d}</div>)}
        </div>
        <div className="grid grid-cols-7 gap-1">
          {cells.map((d, i) => {
            if (d === null) return <div key={i} />;
            const ds = fmt(new Date(cur.y, cur.m, d));
            const isBleed = bleedSet.has(ds);
            const isPred = !isBleed && predicted.has(ds);
            const isToday = ds === today;
            const ck = checkins[ds] || {};
            const mood = ck.feeling && ck.feeling !== "—" ? ck.feeling : null;
            const energy = ck.energy && ck.energy !== "—" ? ck.energy : null;
            let cls = "text-stone-600 hover:bg-stone-100";
            if (isBleed) cls = "bg-violet-500 text-white font-medium";
            else if (isPred) cls = "bg-violet-100 text-violet-700";
            else if (isToday) cls = "border-2 border-violet-400 text-stone-800";
            return (
              <button key={i} onClick={() => toggle(ds)} className={`relative aspect-square rounded-xl flex items-center justify-center text-sm ${cls}`}>
                {mood && <span className={`absolute top-1 left-1/2 -translate-x-1/2 w-4 h-1 rounded-full ${moodBar(mood)}`} />}
                {d}
                {energy && <EnergyBars level={energy} onBleed={isBleed} />}
              </button>
            );
          })}
        </div>
        <div className="flex flex-wrap gap-3 mt-3 text-[11px] text-stone-400">
          <span className="flex items-center gap-1"><span className="w-3.5 h-3.5 rounded-md bg-violet-500" /> bleed</span>
          <span className="flex items-center gap-1"><span className="w-3.5 h-3.5 rounded-md bg-violet-100" /> expected</span>
          <span className="flex items-center gap-1"><span className="w-3.5 h-3.5 rounded-md border-2 border-violet-400" /> today</span>
          <span className="flex items-center gap-1"><span className="w-4 h-1 rounded-full bg-violet-400" /> mood</span>
          <span className="flex items-center gap-1"><span className="flex items-end gap-0.5"><span className="w-1 h-1.5 rounded-sm bg-violet-600" /><span className="w-1 h-2 rounded-sm bg-violet-600" /><span className="w-1 h-2.5 rounded-sm bg-violet-600" /></span> energy</span>
        </div>
      </div>

      <div className="space-y-2">
        <h2 className="text-sm font-medium text-stone-500 px-1">Phase guide — how each tends to feel</h2>
        {PHASES.map((ph) => {
          const isCurrent = phase && phase.name === ph.name;
          return (
            <div key={ph.name} className={`rounded-2xl border p-3 ${isCurrent ? "bg-violet-50 border-violet-200" : "bg-white border-stone-200"}`}>
              <div className="flex items-center gap-2">
                <p className="text-sm font-medium">{ph.name}</p>
                <span className="text-xs text-stone-400">{ph.range}</span>
                {isCurrent && <span className="ml-auto text-[10px] px-1.5 py-0.5 rounded bg-violet-200 text-violet-800">you're here</span>}
              </div>
              <p className="text-xs text-stone-600 mt-1"><b className="font-medium">Feel:</b> {ph.feel}</p>
              <p className="text-xs text-stone-600 mt-1"><b className="font-medium">Training:</b> {ph.train}</p>
            </div>
          );
        })}
        <p className="text-[11px] text-stone-400 px-1">The training notes follow Dr Stacy Sims' general framework for cycling women. In perimenopause cycles get erratic, so your own logged energy and mood are the truer signal — and Sims emphasises that through this stage, heavy strength, sprint-style intervals and jump (plyometric) work pay off regardless of phase.</p>
      </div>
    </div>
  );
}

/* ============ SETTINGS ============ */
function SettingsModal({ settings, saveSettings, onClose }) {
  const [s, setS] = useState(() => ({ ...settings, weightKg: lget("sl:weight", settings.weightKg) }));
  const num = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };

  /* lean-mass method (Katch-McArdle): uses fat-free mass only */
  const ffm = num(s.ffmKg) > 0 ? num(s.ffmKg) : num(s.weightKg) * (1 - num(s.bodyFatPct) / 100);
  const bmr = ffm > 0 ? Math.round(370 + 21.6 * ffm) : 0;
  const tdee = bmr > 0 ? Math.round(bmr * (num(s.activityFactor) || 1.6)) : 0;
  const r10 = (x) => Math.round(x / 10) * 10;
  const suggRest = tdee ? r10(tdee - 100) : 0;
  const suggTrain = tdee ? r10(tdee + 100) : 0;

  const Row = ({ k, label }) => (
    <div className="flex items-center justify-between"><span className="text-sm text-stone-600">{label}</span>
      <input type="number" value={s[k]} onChange={(e) => setS({ ...s, [k]: +e.target.value })} className="w-24 px-3 py-2 rounded-xl border border-stone-200 text-sm text-right" /></div>
  );
  const Bio = ({ k, label, hint, step }) => (
    <div>
      <div className="flex items-center justify-between"><span className="text-sm text-stone-600">{label}</span>
        <input type="number" step={step || "1"} value={s[k] ?? ""} onChange={(e) => setS({ ...s, [k]: e.target.value })} className="w-24 px-3 py-2 rounded-xl border border-stone-200 text-sm text-right" /></div>
      {hint && <p className="text-[11px] text-stone-400 mt-0.5 leading-snug">{hint}</p>}
    </div>
  );

  const save = () => {
    const clean = { ...s, weightKg: num(s.weightKg), bodyFatPct: num(s.bodyFatPct), ffmKg: num(s.ffmKg), activityFactor: num(s.activityFactor) || 1.6 };
    saveSettings(clean);
    if (clean.weightKg > 0) lset("sl:weight", clean.weightKg); // keep strength app's burn estimate in step (this device)
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-end sm:items-center justify-center z-10 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl p-5 w-full max-w-sm space-y-4 max-h-[85vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between"><h2 className="text-lg font-medium">Settings</h2><button onClick={onClose} className="p-1 text-stone-400"><X size={20} /></button></div>

        <div className="space-y-3">
          <h3 className="text-sm font-medium text-stone-700">Body &amp; energy</h3>
          {Bio({ k: "weightKg", label: "Weight (kg)", step: "0.1", hint: "Also updates the weight your strength app uses for burn estimates." })}
          {Bio({ k: "bodyFatPct", label: "Body fat (%)", step: "0.1" })}
          {Bio({ k: "ffmKg", label: "Fat-free mass (kg)", step: "0.1", hint: "From your InBody. Leave at 0 to estimate it from weight and body fat." })}

          <div className="rounded-xl bg-violet-50 border border-violet-100 p-3 space-y-1 text-sm">
            <div className="flex justify-between"><span className="text-stone-500">Fat-free mass</span><span>{ffm ? ffm.toFixed(1) : "—"} kg</span></div>
            <div className="flex justify-between"><span className="text-stone-500">Resting burn</span><span>{bmr || "—"} kcal</span></div>
            <div className="flex justify-between"><span className="text-stone-500">Est. maintenance</span><span className="font-medium text-stone-800">{tdee || "—"} kcal</span></div>
            <div className="flex justify-between pt-1"><span className="text-stone-500">Suggested rest / training</span><span>{suggRest || "—"} / {suggTrain || "—"}</span></div>
          </div>

          <div>
            <label className="block text-[10px] uppercase tracking-wide text-stone-400 mb-1">Activity level</label>
            <select value={String(s.activityFactor)} onChange={(e) => setS({ ...s, activityFactor: e.target.value })} className="w-full px-3 py-2 rounded-xl border border-stone-200 text-sm bg-white">
              <option value="1.45">Lighter training weeks</option>
              <option value="1.55">Moderately active</option>
              <option value="1.6">Typical — your ~6-day week</option>
              <option value="1.7">Very active stretch</option>
            </select>
          </div>

          <button onClick={() => setS({ ...s, restTarget: suggRest, trainTarget: suggTrain })} disabled={!tdee} className="w-full py-2 rounded-xl border border-violet-200 text-violet-800 text-sm hover:bg-violet-50 disabled:opacity-40">Use these as my targets</button>
          <p className="text-[11px] text-stone-400 leading-snug">Resting burn uses the lean-mass method (Katch-McArdle) from your fat-free mass — more accurate for you than generic formulas. Maintenance is an estimate: calibrate it against your weight trend over 2–3 weeks, and lock precise numbers with your dietitian at the July scan.</p>
        </div>

        <div className="space-y-3 pt-3 border-t border-stone-100">
          {Row({ k: "restTarget", label: "Rest-day calories" })}
          {Row({ k: "trainTarget", label: "Training-day calories" })}
          {Row({ k: "proteinTarget", label: "Protein target (g)" })}
          {Row({ k: "cycleLength", label: "Usual cycle length (days)" })}
          {Row({ k: "calciumTarget", label: "Calcium target (mg)" })}
        </div>

        <p className="text-xs text-stone-400">Everything saves on Save. Rest vs training day is detected from your strength log.</p>
        <button onClick={save} className="w-full py-2.5 rounded-xl bg-violet-200 text-violet-900 font-medium hover:bg-violet-300">Save</button>
      </div>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
} catch (err) {
  document.getElementById("root").innerHTML = '<div style="padding:24px;font-family:system-ui;color:#44403c;line-height:1.5"><b>Something went wrong starting the app.</b><br>' + (err && err.message ? err.message : err) + '</div>';
}
</script>
<script>
  setTimeout(function () {
    var r = document.getElementById("root");
    if (r && r.innerHTML.trim() === "") {
      r.innerHTML = '<div style="padding:24px;font-family:system-ui;color:#44403c;line-height:1.5">'
        + '<b>Couldn\'t load.</b><br>This page needs internet access to fetch React and Tailwind. '
        + 'It works on a normal web host (and in Chrome) — some in-app preview panes block those scripts.'
        + '</div>';
    }
  }, 5000);
</script>
</body>
</html>
